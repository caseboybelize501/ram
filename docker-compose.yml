version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ~/.personalai:/app/.personalai
    environment:
      - NOTION_TOKEN=${NOTION_TOKEN}
      - SLACK_TOKEN=${SLACK_TOKEN}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
    depends_on:
      - chromadb
      - neo4j

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chromadb-data:/chroma

  neo4j:
    image: neo4j:5.13-community
    ports:
      - "7687:7687"
      - "7474:7474"
    environment:
      - NEO4J_AUTH=neo4j/password
    volumes:
      - neo4j-data:/data

volumes:
  chromadb-data:
  neo4j-data: